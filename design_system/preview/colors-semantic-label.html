<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:var(--semantic-background-normal-alternative);}
  .chip{width:36px;height:36px;border-radius:8px;flex-shrink:0;border:1px solid rgba(112,115,124,.16);}
  .name{font-size:12px;font-weight:600;}
  .desc{font-size:11px;color:var(--semantic-label-alternative);font-family:var(--font-mono);}
  h4{margin:0 0 12px;font-size:13px;font-weight:600;}
</style></head><body>
<h4>Semantic — Label (text)</h4>
<div class="row">
  <div class="item"><span class="chip" style="background:#171719"></span><div><div class="name">label.normal</div><div class="desc">coolNeutral.10</div></div></div>
  <div class="item"><span class="chip" style="background:rgba(46,47,51,0.88)"></span><div><div class="name">label.neutral</div><div class="desc">cN.22 / 88%</div></div></div>
  <div class="item"><span class="chip" style="background:rgba(55,56,60,0.61)"></span><div><div class="name">label.alternative</div><div class="desc">cN.25 / 61%</div></div></div>
  <div class="item"><span class="chip" style="background:rgba(55,56,60,0.28)"></span><div><div class="name">label.assistive</div><div class="desc">cN.25 / 28%</div></div></div>
  <div class="item"><span class="chip" style="background:rgba(55,56,60,0.16)"></span><div><div class="name">label.disable</div><div class="desc">cN.25 / 16%</div></div></div>
  <div class="item"><span class="chip" style="background:#000"></span><div><div class="name">label.strong</div><div class="desc">common.0</div></div></div>
</div>
</body></html>
