<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:24px;background:var(--semantic-background-normal-alternative);font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:96px;height:60px;border-radius:8px;background:#fff;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--semantic-label-alternative);}
  h4{margin:0 0 14px;font-size:13px;font-weight:600;color:var(--semantic-label-normal);}
</style></head><body>
<h4>Shadow elevation (light mode)</h4>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xsmall)"></div><div class="lbl">xsmall</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-small)"></div><div class="lbl">small</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-medium)"></div><div class="lbl">medium</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-large)"></div><div class="lbl">large</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xlarge)"></div><div class="lbl">xlarge</div></div>
</div>
</body></html>
