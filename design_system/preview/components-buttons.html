<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  button{font-family:inherit;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  /* solid primary */
  .btn-solid-primary-lg{background:var(--semantic-primary-normal);color:#fff;font-size:16px;font-weight:700;padding:12px 28px;border-radius:12px;letter-spacing:.0057em;}
  .btn-solid-primary-md{background:var(--semantic-primary-normal);color:#fff;font-size:15px;font-weight:600;padding:9px 20px;border-radius:10px;}
  .btn-solid-primary-sm{background:var(--semantic-primary-normal);color:#fff;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;}
  /* solid assistive */
  .btn-solid-asst{background:var(--semantic-fill-normal);color:var(--semantic-label-neutral);font-size:15px;font-weight:500;padding:9px 20px;border-radius:10px;backdrop-filter:blur(32px);}
  /* outlined */
  .btn-out-primary{background:transparent;color:var(--semantic-primary-normal);font-size:15px;font-weight:600;padding:9px 20px;border-radius:10px;box-shadow:inset 0 0 0 1px var(--semantic-line-normal-neutral);}
  .btn-out-asst{background:transparent;color:var(--semantic-label-normal);font-size:15px;font-weight:600;padding:9px 20px;border-radius:10px;box-shadow:inset 0 0 0 1px var(--semantic-line-normal-neutral);}
  /* disabled */
  .btn-disabled{background:var(--semantic-interaction-disable);color:var(--semantic-label-assistive);font-size:15px;font-weight:600;padding:9px 20px;border-radius:10px;cursor:not-allowed;}
</style></head><body>
<button class="btn-solid-primary-lg">지원하기</button>
<button class="btn-solid-primary-md">Apply now</button>
<button class="btn-solid-primary-sm">Save</button>
<button class="btn-solid-asst">Filter</button>
<button class="btn-out-primary">자세히 보기</button>
<button class="btn-out-asst">Cancel</button>
<button class="btn-disabled">Submitted</button>
</body></html>
