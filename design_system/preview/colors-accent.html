<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .cell{height:64px;border-radius:10px;display:flex;align-items:flex-end;padding:8px;color:#fff;font-size:11px;font-weight:500;}
  .cap{font-family:var(--font-mono);font-size:9px;opacity:.85;display:block;margin-top:2px;}
  h4{margin:0 0 10px;font-size:13px;font-weight:600;color:var(--semantic-label-normal);}
  .sub{font-size:11px;color:var(--semantic-label-alternative);margin-top:8px;}
</style></head><body>
<h4>Accent palette — categorical (background tier)</h4>
<div class="grid">
  <div class="cell" style="background:#FF5E00">redOrange<span class="cap">50</span></div>
  <div class="cell" style="background:#58CF04">lime<span class="cap">50</span></div>
  <div class="cell" style="background:#00BDDE">cyan<span class="cap">50</span></div>
  <div class="cell" style="background:#00AEFF">lightBlue<span class="cap">50</span></div>
  <div class="cell" style="background:#6541F2">violet<span class="cap">50</span></div>
  <div class="cell" style="background:#CB59FF">purple<span class="cap">50</span></div>
  <div class="cell" style="background:#F553DA">pink<span class="cap">50</span></div>
</div>
<div class="sub">Reserved for tags, badges, charts, category cards. Never gradients or page backgrounds.</div>
</body></html>
