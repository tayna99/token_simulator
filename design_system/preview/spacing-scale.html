<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);}
  h4{margin:0 0 14px;font-size:13px;font-weight:600;color:var(--semantic-label-normal);}
  .stack{display:flex;align-items:flex-end;gap:10px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:#0066FF;border-radius:3px;width:18px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--semantic-label-alternative);}
</style></head><body>
<h4>Spacing scale (px)</h4>
<div class="stack">
  <div class="col"><div class="bar" style="height:1px"></div><div class="lbl">1</div></div>
  <div class="col"><div class="bar" style="height:2px"></div><div class="lbl">2</div></div>
  <div class="col"><div class="bar" style="height:4px"></div><div class="lbl">4</div></div>
  <div class="col"><div class="bar" style="height:6px"></div><div class="lbl">6</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="lbl">8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="lbl">12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="lbl">16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="lbl">24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="lbl">32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="lbl">48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="lbl">64</div></div>
  <div class="col"><div class="bar" style="height:80px"></div><div class="lbl">80</div></div>
</div>
</body></html>
