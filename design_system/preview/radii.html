<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:14px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{width:60px;height:60px;background:#0066FF;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--semantic-label-alternative);}
  h4{margin:0 0 14px;font-size:13px;font-weight:600;color:var(--semantic-label-normal);}
</style></head><body>
<h4>Corner radii</h4>
<div class="row">
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="lbl">6 · sm chip</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">8 · btn-sm</div></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><div class="lbl">10 · btn-md</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">12 · btn-lg</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">16 · card</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div></div>
</div>
</body></html>
