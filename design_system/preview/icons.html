<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px;align-items:center;justify-items:center;color:var(--semantic-label-normal);}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .lbl{font-family:var(--font-mono);font-size:9px;color:var(--semantic-label-alternative);}
  .icon{width:28px;height:28px;}
  h4{margin:0 0 12px;font-size:13px;font-weight:600;}
</style></head><body>
<h4>Iconography — @wanteddev/wds-icon (sample)</h4>
<div class="grid">
  <div class="cell"><img class="icon" src="../assets/icons/bell.svg"/><div class="lbl">bell</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/bell-fill.svg"/><div class="lbl">bell-fill</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/bookmark.svg"/><div class="lbl">bookmark</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/search.svg"/><div class="lbl">search</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/business-bag.svg"/><div class="lbl">biz-bag</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/bubble.svg"/><div class="lbl">bubble</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/bulb.svg"/><div class="lbl">bulb</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/check.svg"/><div class="lbl">check</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/close.svg"/><div class="lbl">close</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/arrow-right.svg"/><div class="lbl">arrow→</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/arrow-up-right.svg"/><div class="lbl">arrow↗</div></div>
  <div class="cell"><img class="icon" src="../assets/icons/attachment.svg"/><div class="lbl">paperclip</div></div>
</div>
</body></html>
