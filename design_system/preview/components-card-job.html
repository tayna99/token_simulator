<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:22px;background:var(--semantic-background-normal-alternative);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{background:#fff;border:1px solid var(--semantic-line-normal-neutral);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:8px;}
  .card:hover{box-shadow:var(--shadow-medium);border-color:transparent;}
  .logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0066FF,#00AEFF);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;}
  .row{display:flex;align-items:center;gap:10px;}
  .co{font-size:12px;color:var(--semantic-label-alternative);}
  .title{font-size:15px;font-weight:600;line-height:1.4;}
  .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;}
  .tag{font-size:12px;padding:4px 8px;border-radius:6px;background:var(--semantic-fill-alternative);color:var(--semantic-label-neutral);}
  .bonus{color:var(--semantic-primary-normal);font-weight:600;font-size:13px;}
</style></head><body>
<div class="card">
  <div class="row"><div class="logo">N</div><div><div class="co">네이버</div></div></div>
  <div class="title">프론트엔드 엔지니어 (React)</div>
  <div class="meta"><span class="tag">서울</span><span class="tag">3년+</span></div>
  <div class="bonus">합격 보너스 1,500,000원</div>
</div>
<div class="card">
  <div class="row"><div class="logo" style="background:linear-gradient(135deg,#6541F2,#CB59FF)">K</div><div><div class="co">카카오</div></div></div>
  <div class="title">Senior Backend Engineer</div>
  <div class="meta"><span class="tag">Pangyo</span><span class="tag">5y+</span><span class="tag">Kotlin</span></div>
  <div class="bonus">합격 보너스 2,000,000원</div>
</div>
</body></html>
