<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:200px;}
  label{font-size:13px;font-weight:500;color:var(--semantic-label-neutral);}
  input{font-family:inherit;font-size:15px;padding:10px 14px;border-radius:10px;border:0;background:var(--semantic-fill-alternative);color:var(--semantic-label-normal);outline:none;transition:box-shadow .2s;}
  input:focus{box-shadow:inset 0 0 0 1px var(--semantic-primary-normal);background:#fff;}
  input::placeholder{color:var(--semantic-label-assistive);}
  .err{box-shadow:inset 0 0 0 1px var(--semantic-status-negative);}
  .help{font-size:12px;color:var(--semantic-status-negative);}
  .helpok{font-size:12px;color:var(--semantic-label-alternative);}
</style></head><body>
<div class="field"><label>이메일</label><input value="hong@wanted.co.kr"/><div class="helpok">Pretendard · 15 / 22</div></div>
<div class="field"><label>비밀번호</label><input class="err" type="password" value="123"/><div class="help">8자 이상 입력해주세요</div></div>
<div class="field"><label>회사명</label><input placeholder="검색어를 입력하세요"/></div>
</body></html>
