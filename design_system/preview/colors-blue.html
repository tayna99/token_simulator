<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:8px;align-items:flex-end;}
  .swatch{flex:1;height:56px;border-radius:8px;display:flex;align-items:flex-end;padding:6px 8px;color:#fff;font-size:11px;font-weight:500;letter-spacing:.02em;}
  .lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--semantic-label-alternative);margin-top:8px;font-feature-settings:"tnum"on;}
  h4{margin:0 0 8px;font-size:13px;font-weight:600;letter-spacing:-.005em;color:var(--semantic-label-normal);}
  .hex{font-family:var(--font-mono);font-size:10px;}
</style></head><body>
<h4>Atomic — Blue (primary)</h4>
<div class="row">
  <div class="swatch" style="background:#001536">10</div>
  <div class="swatch" style="background:#002966">20</div>
  <div class="swatch" style="background:#003E9C">30</div>
  <div class="swatch" style="background:#0054D1">40</div>
  <div class="swatch" style="background:#0066FF;outline:2px solid #0066FF;outline-offset:2px">50★</div>
  <div class="swatch" style="background:#3385FF">60</div>
  <div class="swatch" style="background:#69A5FF;color:#001536">70</div>
  <div class="swatch" style="background:#9EC5FF;color:#001536">80</div>
  <div class="swatch" style="background:#C9DEFE;color:#001536">90</div>
  <div class="swatch" style="background:#EAF2FE;color:#001536">95</div>
</div>
<div class="lbl"><span class="hex">#001536</span><span class="hex">#0066FF — primary.normal</span><span class="hex">#EAF2FE</span></div>
</body></html>
