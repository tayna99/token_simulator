<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:8px;align-items:flex-end;}
  .swatch{flex:1;height:56px;border-radius:8px;display:flex;align-items:flex-end;padding:6px 8px;font-size:11px;font-weight:500;letter-spacing:.02em;}
  h4{margin:0 0 8px;font-size:13px;font-weight:600;color:var(--semantic-label-normal);}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--semantic-label-alternative);margin-top:8px;}
</style></head><body>
<h4>Atomic — Cool Neutral (text + surfaces)</h4>
<div class="row">
  <div class="swatch" style="background:#0F0F10;color:#fff">5</div>
  <div class="swatch" style="background:#171719;color:#fff">10</div>
  <div class="swatch" style="background:#212225;color:#fff">17</div>
  <div class="swatch" style="background:#37383C;color:#fff">25</div>
  <div class="swatch" style="background:#5A5C63;color:#fff">40</div>
  <div class="swatch" style="background:#70737C;color:#fff">50</div>
  <div class="swatch" style="background:#989BA2;color:#fff">70</div>
  <div class="swatch" style="background:#C2C4C8">90</div>
  <div class="swatch" style="background:#DBDCDF">95</div>
  <div class="swatch" style="background:#F4F4F5">98</div>
  <div class="swatch" style="background:#F7F7F8;outline:1px solid #EAEBEC">99</div>
</div>
<div class="hex">cool-tinted gray (slight blue cast). Used for label.normal (10), inverse.bg (15), bg.alt (99).</div>
</body></html>
