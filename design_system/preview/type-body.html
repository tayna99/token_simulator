<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:18px 22px;background:#fff;font-family:var(--font-sans);color:var(--semantic-label-normal);}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px dashed rgba(112,115,124,.16);gap:24px;}
  .row span:first-child{flex:1;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--semantic-label-alternative);flex-shrink:0;}
</style></head><body>
<div class="row"><span class="t-body1">Body 1 — 이력서 한 번으로 여러 회사에 지원하세요.</span><span class="meta">16 / 24 · 400</span></div>
<div class="row"><span class="t-body2">Body 2 — Apply once, reach many teams.</span><span class="meta">15 / 22 · 400</span></div>
<div class="row"><span class="t-label1">Label 1 · 지원하기</span><span class="meta">14 / 20 · 500</span></div>
<div class="row"><span class="t-label2">Label 2 · Save</span><span class="meta">13 / 18 · 500</span></div>
<div class="row"><span class="t-caption1">Caption 1 — 합격 시 보너스 50만원</span><span class="meta">12 / 16 · 400</span></div>
<div class="row"><span class="t-caption2">Caption 2 — Updated 2 days ago</span><span class="meta">11 / 14 · 400</span></div>
</body></html>
