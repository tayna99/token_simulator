<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;font-size:12px;font-weight:500;}
  .b-primary{background:rgba(0,102,255,.1);color:#0054D1;}
  .b-pos{background:#F2FFF6;color:#006E25;}
  .b-warn{background:#FEF4E6;color:#9C5800;}
  .b-neg{background:#FEECEC;color:#B00C0C;}
  .b-violet{background:#F0ECFE;color:#3A16C9;}
  .b-cyan{background:#DEFAFF;color:#006F82;}
  .b-pink{background:#FEECFB;color:#A81690;}
  .b-redOrange{background:#FEEEE5;color:#913500;}
  .dot{width:6px;height:6px;border-radius:999px;background:currentColor;}
</style></head><body>
<span class="badge b-primary"><span class="dot"></span>채용중</span>
<span class="badge b-pos"><span class="dot"></span>합격</span>
<span class="badge b-warn">검토중</span>
<span class="badge b-neg">마감</span>
<span class="badge b-violet">신규</span>
<span class="badge b-cyan">Remote</span>
<span class="badge b-pink">Hot</span>
<span class="badge b-redOrange">+1,500,000</span>
</body></html>
