<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wanted — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--semantic-background-normal-alternative); min-height: 100vh; }
  #app { min-height: 100vh; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="JobDetailScreen.jsx"></script>
<script type="text/babel" src="ApplyScreen.jsx"></script>

<script type="text/babel">
const App = () => {
  const [route, setRoute] = React.useState({ name: 'home' });
  const [bookmarks, setBookmarks] = React.useState({ j2: true });
  const [applying, setApplying] = React.useState(null);
  const [submitted, setSubmitted] = React.useState(false);

  const toggleBookmark = (id) => setBookmarks(b => ({ ...b, [id]: !b[id] }));

  return (
    <>
      <TopNav active={route.name} onNavigate={(n) => setRoute({ name: n })} />
      {route.name === 'home' && (
        <HomeScreen
          onOpenJob={(job) => setRoute({ name: 'job', job })}
          bookmarks={bookmarks}
          toggleBookmark={toggleBookmark}
        />
      )}
      {route.name === 'job' && (
        <JobDetailScreen
          job={route.job}
          bookmarked={bookmarks[route.job.id]}
          onToggleBookmark={() => toggleBookmark(route.job.id)}
          onBack={() => setRoute({ name: 'home' })}
          onApply={() => { setApplying(route.job); setSubmitted(false); }}
        />
      )}
      {applying && (
        <ApplyScreen
          job={applying}
          submitted={submitted}
          onClose={() => setApplying(null)}
          onSubmit={() => setSubmitted(true)}
        />
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
